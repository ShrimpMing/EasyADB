name: Cross-Platform CI

on:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "main"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            java-version: '17'
            build-command: './gradlew.bat packageReleaseMsi'
            artifact-path: 'build/compose/binaries/main-release/msi/**'
            artifact-name: 'windows-msi'
          - os: macos-latest
            java-version: '17'
            build-command: './gradlew packageReleaseDmg'
            artifact-path: 'build/compose/binaries/main-release/dmg/**'
            artifact-name: 'macos-dmg'
          - os: ubuntu-latest
            java-version: '17'
            build-command: './gradlew packageReleaseDeb'
            artifact-path: 'build/compose/binaries/main-release/deb/**'
            artifact-name: 'linux-deb'
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission for gradlew (Unix only)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot
      
      - name: Build application
        run: ${{ matrix.build-command }}
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
